<!-- ============================================================
     Wazuh Manager Configuration — Key Sections
     File: /var/ossec/etc/ossec.conf
     
     NOTE: This is NOT the complete ossec.conf file.
     These are the sections added/modified for this project.
     Add these blocks to your existing ossec.conf.
     ============================================================ -->

<!-- ==================== FILE INTEGRITY MONITORING ==================== -->
<!-- Monitors critical system directories for unauthorized changes -->
<syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Monitored directories with real-time detection enabled -->
    <directories realtime="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories>/bin,/sbin,/boot</directories>

    <!-- Excluded files (noisy/irrelevant) -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/random.seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>
    <ignore type="sregex">.log$|.swp$</ignore>

    <nodiff>/etc/ssl/private.key</nodiff>
    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
    <process_priority>10</process_priority>
    <max_eps>50</max_eps>

    <synchronization>
        <enabled>yes</enabled>
        <interval>5m</interval>
        <max_eps>10</max_eps>
    </synchronization>
</syscheck>

<!-- ==================== ACTIVE RESPONSE ==================== -->
<!-- Auto-block IPs that trigger brute-force rules -->
<active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>5720,5763</rules_id>
    <timeout>600</timeout>
</active-response>

<!-- Auto-block IPs that trigger port scan detection -->
<active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>581</rules_id>
    <timeout>600</timeout>
</active-response>

<!-- ==================== THEHIVE INTEGRATION ==================== -->
<!-- Forwards high-severity alerts to TheHive for case management -->
<integration>
    <name>custom-thehive</name>
    <hook_url>http://127.0.0.1:9000/api/alert</hook_url>
    <api_key>YOUR_THEHIVE_API_KEY_HERE</api_key>
    <alert_format>json</alert_format>
    <rule_id>5720,5763</rule_id>
</integration>
